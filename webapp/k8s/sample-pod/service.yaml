apiVersion: v1
kind: Service
metadata:
  name: samplepod-service
  namespace: project-b
  labels:
    app: sampleapp
    environment: dev
spec:
  type: LoadBalancer
  ports:
    - name: webport
      protocol: TCP
      port: 80
      targetPort: 80
  selector:
    app: sampleapp
    environment: dev